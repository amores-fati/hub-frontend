name: CI/CD Pipeline - Frontend

on:
    pull_request:
        branches:
            - main
            - development

jobs:
    quality-and-build:
        name: Code Quality and Build Check
        runs-on: ubuntu-latest

        steps:
            - name: Checkout Code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: 'npm'

            - name: Install Dependencies
              run: npm ci

            - name: Lint Code
              run: npx next lint

            - name: Check Formatting (Prettier)
              run: npx prettier --check .

            - name: Build Application
              run: npm run build
